kind: ConfigMap 
apiVersion: v1 
metadata:
  name: adabasmanager-configmap
data:
  # Configuration values can be set as key-value properties
  ACCEPT_EULA: "Y"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adabasmanager-deployment
  labels:
    app: adabasmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adabasmanager
  template:
    metadata:
      labels:
        app: adabasmanager
    spec:
      containers:
      - name: adabasmanager
        image: softwareag/adabasmanager-ce:9.4.0
               
        envFrom:
        - configMapRef:
            name: adabasmanager-configmap
        ports:
        - containerPort: 4990
          name: adamgrport

---
apiVersion: v1
kind: Service
metadata:
  name: adabasmanager-service
  labels:
    app: adabasmanager
spec:
  selector:
    app: adabasmanager
  ports:
    - protocol: TCP
      port: 4990
      targetPort: 4990
      name: adamgrport

  type: ClusterIP
